apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: zomato
  name: zomato-deployx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zomato
  template:
    metadata:
      labels:
        app: zomato
    spec:
      containers:
      - name: conta11
        image: sharmaatulkumar29/zomatoimage:8c14f200d8b1df4741b803f960a0a6a4faed2f2e
        ports:
          - containerPort: 3000
