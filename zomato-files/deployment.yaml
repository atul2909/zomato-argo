apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: zomato
  name: zomato-deployx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zomato
  template:
    metadata:
      labels:
        app: zomato
    spec:
      containers:
      - name: conta11
        image: sharmaatulkumar29/zomatoimage:c5d0bb087a7cc5445b5dab93ee3a4cea90aa310e
        ports:
          - containerPort: 3000
