apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: zomato
  name: zomato-deploy
spec:
  replicas: 5
  selector:
    matchLabels:
      app: zomato
  template:
    metadata:
      labels:
        app: zomato
    spec:
      containers:
      - name: cont1
        image: rahamshaik/zomatoimage:b2d6ccd1537349f487addac08b5963830445715c
        ports:
          - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: service1
spec:
  type: NodePort
  selector:
    app: zomato
  ports:
    - port: 3000
